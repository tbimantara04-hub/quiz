name: Selenium Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: quiz_pengupil
        ports:
          - "3306:3306"

    steps:
    - uses: actions/checkout@v3

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mysqli, pdo_mysql

    - name: Wait for MySQL to be ready
      run: |
        until mysqladmin ping -h 127.0.0.1 --silent; do
          echo "Waiting for MySQL database to start..."
          sleep 3
        done

    - name: Import Database
      run: |
        mysql -h 127.0.0.1 -u root quiz_pengupil < db/quiz_pengupil.sql
        # Update password user 'ahmad' ke 'password123' agar sesuai dengan testcase
        mysql -h 127.0.0.1 -u root quiz_pengupil -e "UPDATE users SET password='\$2y\$10\$25SITQTDZvTioM.TT65IXedugTtFeUNFnXJCAk/LK9VA93ItXCvvq' WHERE username='ahmad';"

    - name: Patch koneksi.php for CI (use 127.0.0.1 instead of localhost)
      run: |
        sed -i "s/'localhost'/'127.0.0.1'/g" koneksi.php
        echo "koneksi.php after patch:"
        cat koneksi.php

    - name: Start PHP Server
      run: |
        php -S localhost:8000 &
        # Wait until PHP server is actually responding
        until curl -s http://localhost:8000/login.php > /dev/null; do
          echo "Waiting for PHP server..."
          sleep 1
        done
        echo "PHP server is ready!"

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium

    - name: Run Selenium Tests
      env:
        BASE_URL: http://localhost:8000
      run: |
        echo "=== Running test_app.py ==="
        python tests/test_app.py
        echo "=== Running test_auth.py ==="
        python tests/test_auth.py
